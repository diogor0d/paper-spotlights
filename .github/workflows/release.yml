name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Check tag matches project version
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error title=Invalid release tag::Expected vMAJOR.MINOR.PATCH, got ${GITHUB_REF_NAME}."
            exit 1
          fi
          project_version="$(bash ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if [[ "${GITHUB_REF_NAME}" != "v${project_version}" ]]; then
            echo "::error title=Release version mismatch::Tag ${GITHUB_REF_NAME} points to a commit whose pom.xml version is ${project_version}. Commit the matching version before creating the tag."
            exit 1
          fi
      - name: Build and test
        run: bash ./mvnw --batch-mode clean verify
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" target/PaperSpotlights.jar --verify-tag --generate-notes
